name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,ADMIN_PASSWORD
          script: |
            mkdir -p /home/magical-girls/data /home/magical-girls/backups
            cd /home/magical-girls

            # Create .env if not exists
            if [ ! -f .env ]; then
              echo "ADMIN_PASSWORD=$ADMIN_PASSWORD" > .env
            fi

            # Create docker-compose.yml
            cat > docker-compose.yml << 'COMPOSE_EOF'
            services:
              witch-trial:
                image: ghcr.io/xiaoyuyu6420/magical-girls-witch-trial:latest
                container_name: witch-trial
                restart: unless-stopped
                ports:
                  - "8091:3001"
                volumes:
                  - ./data:/app/data
                  - ./backups:/backups
                environment:
                  - DATABASE_URL=file:./data/witch-trial.db
                  - PORT=3001
                  - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
                  - NODE_ENV=production
                healthcheck:
                  test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/count"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 30s
                deploy:
                  resources:
                    limits:
                      memory: 512M
                      cpus: "1.0"
                logging:
                  driver: json-file
                  options:
                    max-size: "10m"
                    max-file: "3"

              backup:
                image: ghcr.io/xiaoyuyu6420/magical-girls-witch-trial:latest
                container_name: witch-trial-backup
                restart: unless-stopped
                volumes:
                  - ./data:/app/data:ro
                  - ./backups:/backups
                entrypoint: ["/bin/sh", "-c"]
                command:
                  - |
                    echo "Backup service started. Running every 6 hours."
                    while true; do
                      /app/scripts/backup.sh
                      sleep 21600
                    done
                deploy:
                  resources:
                    limits:
                      memory: 64M
                logging:
                  driver: json-file
                  options:
                    max-size: "5m"
                    max-file: "2"
            COMPOSE_EOF

            # Login to GHCR
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u xiaoyuyu6420 --password-stdin

            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
            sudo docker image prune -f
            echo "Deployed at $(date)"