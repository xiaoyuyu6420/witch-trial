name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 60m
          script: |
            mkdir -p /home/magical-girls/data /home/magical-girls/backups
            cd /home/magical-girls

            # Check .env exists
            if [ ! -f .env ] || ! grep -q "ADMIN_PASSWORD" .env; then
              echo "ERROR: Create .env first"
              exit 1
            fi

            # Clone or pull from Gitee
            if [ ! -d .git ]; then
              git clone https://XYY526:${{ secrets.GITEE_TOKEN }}@gitee.com/XYY526/magical-girls-witch-trial.git .
            else
              git pull https://XYY526:${{ secrets.GITEE_TOKEN }}@gitee.com/XYY526/magical-girls-witch-trial.git main
            fi

            # Build image locally
            docker build -t magical-girls-witch-trial:latest .

            # Write docker-compose.yml
            cat > docker-compose.yml << 'COMPOSE_EOF'
            services:
              magical-girls-witch-trial:
                image: magical-girls-witch-trial:latest
                build: .
                container_name: magical-girls-witch-trial
                restart: unless-stopped
                ports:
                  - "8091:3001"
                volumes:
                  - ./data:/app/data
                  - ./backups:/backups
                environment:
                  - DATABASE_URL=file:./data/witch-trial.db
                  - PORT=3001
                  - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
                  - NODE_ENV=production
                healthcheck:
                  test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/count"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 30s
                deploy:
                  resources:
                    limits:
                      memory: 512M
                      cpus: "1.0"
                logging:
                  driver: json-file
                  options:
                    max-size: "10m"
                    max-file: "3"
            COMPOSE_EOF

            docker compose up -d --build --remove-orphans
            docker image prune -f
            echo "Deployed at $(date)"