services:
  magical-girls-witch-trial:
    image: xiaoyuyu123/magical-girls-witch-trial:latest
    build: .
    container_name: magical-girls-witch-trial
    restart: unless-stopped
    ports:
      - "8091:3001"
    volumes:
      - ./data:/app/data
      - ./backups:/backups
    environment:
      - DATABASE_URL=file:/app/data/witch-trial.db
      - PORT=3001
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/count"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"